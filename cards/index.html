<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Cards</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<main id="playing-cards">
  <div class="card">
    <div class="left">
      <div class="letter">A</div>
      <div class="symbol">♠</div>
    </div>
    <div class="middle large">
      <div class="symbol">♠</div>
    </div>
    <div class="right">
      <div class="symbol">♠</div>
      <div class="letter">A</div>
    </div>
  </div>

  <div class="card">
    <div class="left">
      <div class="number">2</div>
      <div class="symbol">♣</div>
    </div>
    <div class="middle medium">
      <div class="symbol">♣</div>
      <div class="symbol reverse">♣</div>
    </div>
    <div class="right">
      <div class="symbol">♣</div>
      <div class="number">2</div>
    </div>
  </div>

  <div class="card red">
    <div class="left">
      <div class="number">3</div>
      <div class="symbol">♥</div>
    </div>
    <div class="middle medium">
      <div class="symbol">♥</div>
      <div class="symbol">♥</div>
      <div class="symbol reverse">♥</div>
    </div>
    <div class="right">
      <div class="symbol">♥</div>
      <div class="number">3</div>
    </div>
  </div>

  <div class="card">
    <div class="left">
      <div class="number">4</div>
      <div class="symbol">♣</div>
    </div>
    <div class="middle medium grid">
      <div class="symbol">♣</div>
      <div class="symbol">♣</div>
     
      <div class="symbol reverse">♣</div>
      <div class="symbol reverse">♣</div>
      
    </div>
    <div class="right">
      <div class="symbol">♣</div>
      <div class="number">4</div>
    </div>
  </div>

  <div class="card red">
    <div class="left">
      <div class="number">5</div>
      <div class="symbol">♦</div>
    </div>
    <div class="middle medium grid2">
      <div class="symbol">♦</div>
      <div class="symbol">♦</div>
      <div class="between symbol">♦</div>
      <div class="symbol">♦</div>
      <div class="symbol">♦</div>
    </div>
    <div class="right">
      <div class="number">5</div>
      <div class="symbol">♦</div>
    </div>
  </div>



</main>
</body>
</html>
